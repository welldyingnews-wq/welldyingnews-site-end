<!-- 신청 폼 (기사제보, 저작권문의, 불편신고, 독자투고, 제휴문의 공통) -->
<div id="event-wrap" class="default-theme">

    <!-- flash 메시지 -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="event-flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form name="eventReqForm" id="eventReqForm" method="POST" action="{{ url_for('public.event_submit') }}">
        <input type="hidden" name="page_code" value="{{ page_code }}">

        <section id="event-container">
            <div class="event-content">

                <!-- 개인정보 동의 -->
                <div class="event-agree">
                    <h3 class="event-agree-titles">개인정보보호를 위한 이용자 동의사항 <small class="show-for-sr">(필수)</small></h3>
                    <label class="show-for-sr" for="agreetext">약관내용</label>
                    <textarea name="agreetext" id="agreetext" class="event-agree-text" title="약관내용" readonly>{{ page.title }} 등을 희망하는 기업 및 개인을 대상으로 아래와 같이 개인정보를 수집하고 있습니다.

1. 수집 개인정보 항목 : 이름, 이메일, 전화번호
2. 개인정보의 수집 및 이용목적 : 신청에 따른 본인확인 및 원활한 의사소통 경로 확보
3. 개인정보의 이용기간 : 모든 검토가 완료된 후 3개월간 이용자의 조회를 위하여 보관하며, 이후 해당정보를 지체 없이 파기합니다.
4. 개인정보 수집 동의 거부권 : 개인정보 수집 동의에 거부할 수 있으며 동의하지 않는 경우 의견 접수가 불가능합니다.
5. 그 밖의 사항은 개인정보처리방침을 준수합니다.</textarea>
                    <label class="nd-checkbox check-primary text-center" for="useagree">
                        <input type="checkbox" id="useagree" name="useagree" title="정보동의" required>
                        <span class="nd-checked size-15">개인정보보호를 위한 이용자 동의사항을 확인하였습니다.</span>
                    </label>
                </div>

                <hr>

                <!-- 이름 -->
                <fieldset id="fieldset_name" class="row expanded small-collapse medium-uncollapse">
                    <div class="medium-3 large-2 columns">
                        <label class="medium-middle" for="ev_name"><strong class="key-point">이름</strong></label>
                    </div>
                    <div class="medium-9 large-10 columns">
                        <input type="text" name="name" id="ev_name" placeholder="홍길동" title="이름" required>
                    </div>
                </fieldset>

                <!-- 이메일 -->
                <fieldset id="fieldset_email" class="row expanded small-collapse medium-uncollapse">
                    <div class="medium-3 large-2 columns">
                        <label class="medium-middle" for="ev_email"><strong class="key-point">이메일</strong></label>
                    </div>
                    <div class="medium-9 large-10 columns">
                        <input type="email" name="email" id="ev_email" placeholder="email@naver.com" title="이메일" required>
                    </div>
                </fieldset>

                <!-- 연락처 -->
                <fieldset id="fieldset_tel" class="row expanded small-collapse medium-uncollapse">
                    <div class="medium-3 large-2 columns">
                        <label class="medium-middle" for="ev_tel"><strong class="key-point">연락처</strong></label>
                    </div>
                    <div class="medium-9 large-10 columns">
                        <input type="tel" name="tel" id="ev_tel" placeholder="010-1234-4567" title="연락처" required>
                    </div>
                </fieldset>

                <!-- 제목 -->
                <fieldset id="fieldset_subject" class="row expanded small-collapse medium-uncollapse">
                    <div class="medium-3 large-2 columns">
                        <label class="medium-middle" for="ev_subject"><strong class="key-point">제목</strong></label>
                    </div>
                    <div class="medium-9 large-10 columns">
                        <input type="text" name="subject" id="ev_subject" placeholder="제목을 입력해주세요." title="제목" required>
                    </div>
                </fieldset>

                <!-- 내용 -->
                <fieldset id="fieldset_maintext" class="row expanded small-collapse medium-uncollapse">
                    <div class="medium-3 large-2 columns">
                        <label class="medium-middle" for="ev_maintext"><strong class="key-point">내용</strong></label>
                    </div>
                    <div class="medium-9 large-10 columns">
                        <textarea rows="3" name="maintext" id="ev_maintext" placeholder="내용을 입력해주세요" title="내용" required></textarea>
                    </div>
                </fieldset>

                <!-- 버튼 -->
                <hr>
                <div class="clearfix text-center" id="confirmBtn">
                    <div class="button-group small-expanded">
                        <button type="submit" class="button user-bg small-expanded"><i class="icon-check"></i>&nbsp;확인</button>
                        <button type="reset" class="button nd-white"><i class="icon-refresh"></i>&nbsp;취소</button>
                    </div>
                </div>

            </div>
        </section>
    </form>
</div>
