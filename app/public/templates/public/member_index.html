{% extends "public/base_v0.html" %}
{% block title %}회원가입 — 웰다잉뉴스{% endblock %}

{% block content %}
<div class="container section-gap">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1 class="auth-card__title">회원가입</h1>
      <p class="auth-card__desc">다음 중 어디에 해당되는지 선택해 주세요.</p>
    </div>

    <div class="auth-card__body">
      <p class="auth-card__question">만 14세 이상입니까?</p>
      <a href="{{ url_for('public.member_agree', kind='member') }}" class="auth-btn-choice">
        <i class="fa-solid fa-user"></i>
        <span>예, 일반회원입니다</span>
      </a>
      <a href="{{ url_for('public.member_agree', kind='member') }}" class="auth-btn-choice auth-btn-choice--secondary">
        <i class="fa-solid fa-child"></i>
        <span>아니요, 어린이회원입니다</span>
      </a>
    </div>

    <div class="auth-card__footer">
      이미 회원이신가요? <a href="{{ url_for('public.member_login') }}">로그인</a>
    </div>
  </div>
</div>
{% endblock %}
