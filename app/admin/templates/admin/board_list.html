{% extends "admin/base.html" %}
{% block nav_title %}게시판관리{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-4 mb-3">
        <div class="card">
            <div class="card-header"><strong>게시판 추가</strong></div>
            <div class="card-body">
                <form method="post" action="{{ url_for('admin.board_add') }}">
                    <div class="mb-2"><input type="text" name="code" class="form-control form-control-sm" placeholder="코드 (예: notice)" required></div>
                    <div class="mb-2"><input type="text" name="name" class="form-control form-control-sm" placeholder="게시판 이름" required></div>
                    <button class="btn btn-primary btn-sm w-100"><i class="bi bi-plus-lg"></i> 추가</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header"><strong>게시판 목록</strong></div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light"><tr><th>코드</th><th>이름</th><th>게시물</th><th>상태</th><th>관리</th></tr></thead>
                    <tbody>
                        {% for b in boards %}
                        <tr>
                            <td><code>{{ b.code }}</code></td><td>{{ b.name }}</td>
                            <td><span class="badge bg-secondary">{{ b.posts.count() }}</span></td>
                            <td><span class="badge {% if b.is_active %}bg-success{% else %}bg-danger{% endif %}">{{ '활성' if b.is_active else '비활성' }}</span></td>
                            <td>
                                <form method="post" action="{{ url_for('admin.board_delete', board_id=b.id) }}" class="d-inline" onsubmit="return confirm('게시물도 함께 삭제됩니다.')">
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr><td colspan="5" class="text-center text-muted py-3">게시판이 없습니다.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
