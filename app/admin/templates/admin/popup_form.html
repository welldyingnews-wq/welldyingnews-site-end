{% extends "admin/base.html" %}
{% block nav_title %}{{ '팝업수정' if popup and popup.id else '팝업등록' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><strong>{{ '팝업수정' if popup and popup.id else '팝업등록' }}</strong></div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data" action="{{ url_for('admin.popup_edit', popup_id=popup.id) if popup and popup.id else url_for('admin.popup_new') }}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">팝업명</label>
                        <input type="text" name="name" class="form-control" value="{{ popup.name if popup else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">내용 (HTML)</label>
                        <textarea name="content" class="form-control" rows="5">{{ popup.content if popup else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">링크 URL</label>
                        <input type="url" name="link_url" class="form-control" value="{{ popup.link_url if popup else '' }}">
                    </div>
                    <div class="row mb-3">
                        <div class="col"><label class="form-label fw-bold">가로</label><input type="number" name="width" class="form-control" value="{{ popup.width if popup else 500 }}"></div>
                        <div class="col"><label class="form-label fw-bold">세로</label><input type="number" name="height" class="form-control" value="{{ popup.height if popup else 400 }}"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col"><label class="form-label fw-bold">X 위치 (px)</label><input type="number" name="pos_x" class="form-control" value="{{ popup.pos_x if popup else 100 }}"></div>
                        <div class="col"><label class="form-label fw-bold">Y 위치 (px)</label><input type="number" name="pos_y" class="form-control" value="{{ popup.pos_y if popup else 100 }}"></div>
                    </div>
                    <div class="row mb-3">
                        <div class="col"><label class="form-label fw-bold">시작일</label><input type="datetime-local" name="start_date" class="form-control" value="{{ popup.start_date.strftime('%Y-%m-%dT%H:%M') if popup and popup.start_date else '' }}"></div>
                        <div class="col"><label class="form-label fw-bold">종료일</label><input type="datetime-local" name="end_date" class="form-control" value="{{ popup.end_date.strftime('%Y-%m-%dT%H:%M') if popup and popup.end_date else '' }}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">이미지</label>
                        {% if popup and popup.image_path %}<div class="mb-2"><img src="{{ popup.image_path if popup.image_path.startswith(('http', '/')) else url_for('static', filename=popup.image_path) }}" class="img-fluid rounded" style="max-height:150px"></div>{% endif %}
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" value="1" id="isActive" {% if not popup or popup.is_active %}checked{% endif %}><label class="form-check-label" for="isActive">활성</label></div>
                    </div>
                    <div class="d-grid"><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 저장</button></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
