{% extends "admin/base.html" %}
{% block nav_title %}부서관리{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-4 mb-3">
        <div class="card">
            <div class="card-header"><strong>부서 추가</strong></div>
            <div class="card-body">
                <form method="post" action="{{ url_for('admin.department_add') }}">
                    <div class="mb-2"><input type="text" name="name" class="form-control form-control-sm" placeholder="부서명" required></div>
                    <button class="btn btn-primary btn-sm w-100"><i class="bi bi-plus-lg"></i> 추가</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header"><strong>부서 목록</strong></div>
            <ul class="list-group list-group-flush">
                {% for d in departments %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>{{ d.name }}</span>
                    <form method="post" action="{{ url_for('admin.department_delete', dept_id=d.id) }}" onsubmit="return confirm('삭제?')">
                        <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                    </form>
                </li>
                {% else %}
                <li class="list-group-item text-center text-muted py-3">부서가 없습니다.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endblock %}
